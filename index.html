<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Prickar – radial prototyp</title>
<style>
  :root{
    --bg0:#020608;
    --bg1:#03111a;
    --bg2:#071b26;
    --bg3:#132512;

    --ink:#eefbff;
    --muted:rgba(220,245,245,.76);

    --line:rgba(170,235,220,.16);
    --lineNew:rgba(255,220,120,.95);
    --glass:rgba(255,255,255,.05);
    --shadow:rgba(0,0,0,.52);

    --root:#8fe8d9;

    --matte:#49d8ff;
    --no:#58dd83;
    --so:#ff0000;
    --sprak:#80e6d9;
    --idh:#d6e86b;
    --blandat:#c8f47c;

    --subcategory:#7fdccf;
    --game:#dce89c;
    --gameText:#f7fffd;

    --new:#ffd768;

    --ring-soft:rgba(255,255,255,.08);
    --ring-strong:rgba(255,255,255,.22);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }

  body{
    overflow:hidden;
        font-family: "Gill Sans", "Trebuchet MS", Arial, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 8% 54%, rgba(24,146,214,.18) 0 10%, transparent 26%),
      radial-gradient(circle at 44% 62%, rgba(82,225,210,.08) 0 10%, transparent 30%),
      radial-gradient(circle at 61% 40%, rgba(70,210,120,.06) 0 8%, transparent 22%),
      radial-gradient(circle at 76% 88%, rgba(218,235,120,.07) 0 10%, transparent 20%),
      radial-gradient(circle at 92% 54%, rgba(247,205,89,.14) 0 11%, transparent 23%),
      linear-gradient(180deg, #010304 0%, #02080b 18%, #031119 46%, #02080c 100%);
	  
  }

  .bokehWrap{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
  }

  .bokehLayer{
    position:absolute;
    inset:-10vmax;
    pointer-events:none;
    will-change:transform;
    transition:transform 900ms cubic-bezier(.22,.8,.2,1);
  }

  .bokeh{
    position:absolute;
    inset:0;
    pointer-events:none;
    mix-blend-mode:screen;
  }

  .bokeh::before,
  .bokeh::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
  }

.bokeh-far{
  background:
    radial-gradient(circle at 16% 54%, rgba(35,143,255,.16) 0 34px, transparent 36px),
    radial-gradient(circle at 36% 66%, rgba(70,220,220,.13) 0 55px, transparent 57px),
    radial-gradient(circle at 58% 36%, rgba(94,218,123,.13) 0 44px, transparent 46px),
    radial-gradient(circle at 78% 58%, rgba(220,240,130,.13) 0 48px, transparent 50px),
    radial-gradient(circle at 92% 56%, rgba(255,212,110,.16) 0 42px, transparent 44px),
    radial-gradient(circle at 10% 30%, rgba(55,180,255,.13) 0 30px, transparent 32px),
    radial-gradient(circle at 26% 78%, rgba(85,230,240,.11) 0 40px, transparent 42px),
    radial-gradient(circle at 48% 18%, rgba(100,225,130,.11) 0 36px, transparent 38px),
    radial-gradient(circle at 68% 72%, rgba(215,238,120,.11) 0 38px, transparent 40px),
    radial-gradient(circle at 86% 24%, rgba(255,220,120,.13) 0 34px, transparent 36px);
  filter: blur(15px);
  opacity:.50;
  animation: driftFar 34s linear infinite;
}

.bokeh-far::before{
  background:
    radial-gradient(circle at 28% 24%, rgba(45,205,255,.10) 0 21px, transparent 23px),
    radial-gradient(circle at 66% 78%, rgba(88,225,130,.09) 0 30px, transparent 32px),
    radial-gradient(circle at 18% 70%, rgba(70,210,255,.08) 0 24px, transparent 26px),
    radial-gradient(circle at 84% 34%, rgba(120,235,150,.08) 0 26px, transparent 28px);
  filter: blur(1px);
  opacity:.9;
}

.bokeh-mid{
  background:
    radial-gradient(circle at 20% 52%, rgba(42,179,255,.22) 0 70px, transparent 74px),
    radial-gradient(circle at 36% 80%, rgba(86,255,240,.06) 0 75px, transparent 79px),
    radial-gradient(circle at 70% 24%, rgba(78,220,112,.18) 0 59px, transparent 63px),
    radial-gradient(circle at 80% 58%, rgba(234,255,150,.18) 0 61px, transparent 65px),
    radial-gradient(circle at 96% 54%, rgba(255,220,110,.22) 0 69px, transparent 73px),
    radial-gradient(circle at 12% 18%, rgba(55,190,255,.16) 0 58px, transparent 62px),
    radial-gradient(circle at 30% 30%, rgba(95,245,230,.08) 0 64px, transparent 68px),
    radial-gradient(circle at 54% 70%, rgba(82,230,120,.15) 0 56px, transparent 60px),
    radial-gradient(circle at 72% 82%, rgba(220,250,145,.15) 0 60px, transparent 64px),
    radial-gradient(circle at 88% 18%, rgba(255,210,100,.18) 0 66px, transparent 70px);
  filter: blur(10px);
  opacity:.72;
  animation: driftMid 28s linear infinite;
}

.bokeh-mid::before{
  background:
    radial-gradient(circle at 42% 18%, rgba(70,200,255,.12) 0 20px, transparent 22px),
    radial-gradient(circle at 74% 34%, rgba(155,230,90,.11) 0 24px, transparent 26px),
    radial-gradient(circle at 88% 78%, rgba(255,202,85,.10) 0 21px, transparent 23px),
    radial-gradient(circle at 16% 68%, rgba(80,210,255,.10) 0 22px, transparent 24px),
    radial-gradient(circle at 58% 84%, rgba(255,225,120,.09) 0 20px, transparent 22px),
    radial-gradient(circle at 64% 12%, rgba(120,245,180,.09) 0 23px, transparent 25px);
  filter: blur(5px);
  opacity:.9;
}

.bokeh-near{
  background:
    radial-gradient(circle at 14% 16%, rgba(55,175,255,.20) 0 105px, transparent 110px),
    radial-gradient(circle at 40% 34%, rgba(82,255,230,.16) 0 94px, transparent 99px),
    radial-gradient(circle at 20% 42%, rgba(70,230,112,.16) 0 88px, transparent 93px),
    radial-gradient(circle at 70% 38%, rgba(245,255,166,.17) 0 87px, transparent 92px),
    radial-gradient(circle at 96% 54%, rgba(255,211,96,.20) 0 98px, transparent 103px),
    radial-gradient(circle at 8% 70%, rgba(60,180,255,.16) 0 90px, transparent 95px),
    radial-gradient(circle at 30% 72%, rgba(100,255,220,.13) 0 82px, transparent 87px),
    radial-gradient(circle at 56% 18%, rgba(88,235,125,.13) 0 80px, transparent 85px),
    radial-gradient(circle at 78% 72%, rgba(240,245,150,.14) 0 86px, transparent 91px),
    radial-gradient(circle at 88% 20%, rgba(255,220,110,.16) 0 92px, transparent 97px);
  filter: blur(3px);
  opacity:.34;
  animation: driftNear 40s linear infinite;
}

.bokeh-near::before{
  background:
    radial-gradient(circle at 10% 86%, rgba(43,170,255,.10) 0 37px, transparent 39px),
    radial-gradient(circle at 52% 24%, rgba(118,255,218,.08) 0 41px, transparent 43px),
    radial-gradient(circle at 90% 18%, rgba(255,221,113,.10) 0 32px, transparent 34px),
    radial-gradient(circle at 26% 58%, rgba(70,190,255,.08) 0 36px, transparent 38px),
    radial-gradient(circle at 68% 84%, rgba(130,255,210,.07) 0 40px, transparent 42px),
    radial-gradient(circle at 82% 64%, rgba(255,228,120,.08) 0 34px, transparent 36px);
  filter: blur(0px);
  opacity:.92;
}

  @keyframes driftFar {
    from{ transform:translate3d(0,0,0); }
    50%{ transform:translate3d(1.2vmax,-0.9vmax,0); }
    to{ transform:translate3d(0,0,0); }
  }

  @keyframes driftMid {
    from{ transform:translate3d(0,0,0); }
    50%{ transform:translate3d(2.2vmax,-1.4vmax,0); }
    to{ transform:translate3d(0,0,0); }
  }

  @keyframes driftNear {
    from{ transform:translate3d(0,0,0); }
    50%{ transform:translate3d(3.2vmax,1.8vmax,0); }
    to{ transform:translate3d(0,0,0); }
  }

  #stage{

    inset:0;
    overflow:hidden;
  }

  #camera{
    position:absolute;
    inset:0;
    transform:translate3d(0,0,0);
    transition:transform 700ms cubic-bezier(.22,.8,.2,1);
    will-change:transform;
  }

  .node{
    position:absolute;
    left:0;
    top:0;
    transform:translate(-50%,-50%) scale(1);
    border-radius:999px;
    display:grid;
    place-items:center;
    text-align:center;
    cursor:pointer;
    user-select:none;
    border:1px solid var(--ring-soft);

      0 0 18px rgba(255,255,255,.07),
      0 0 28px rgba(120,255,220,.05),
      0 18px 34px rgba(0,0,0,.26);
    transition:
      transform .28s ease,
      opacity .28s ease,

      border-color .28s ease,
      background .28s ease,
      filter .28s ease;
    opacity:0;
    will-change:transform;
    overflow:hidden;
    backdrop-filter: blur(9px);
	  text-decoration:none;

	  text-transform:uppercase;

}

<body>
  <div class="bokehWrap" aria-hidden="true">
    <div class="bokehLayer bokehLayer-far"><div class="bokeh bokeh-far"></div></div>
    <div class="bokehLayer bokehLayer-mid"><div class="bokeh bokeh-mid"></div></div>
    <div class="bokehLayer bokehLayer-near"><div class="bokeh bokeh-near"></div></div>
  </div>


  <main id="stage" aria-label="Radial meny">
<div id="camera">
  <svg class="lines" id="lines" aria-hidden="true"></svg>
  <div id="lineBadges" class="lineBadges" aria-hidden="true"></div>
</div>
  </main>

  <div class="descriptionBar is-left" id="descriptionBar"></div>

  <script src="menu-data.js"></script>
  <script>
  const data = window.PrickarMenuData;
  const stage = document.getElementById('stage');
  const camera = document.getElementById('camera');
  const lines = document.getElementById('lines');
  const lineBadges = document.getElementById('lineBadges');
  const bokehLayers = {
    far: document.querySelector('.bokehLayer-far'),
    mid: document.querySelector('.bokehLayer-mid'),
    near: document.querySelector('.bokehLayer-near')
  };
  const descriptionBar = document.getElementById('descriptionBar');
  descriptionBar.classList.add('is-left');
  

  const plopSounds = [
    new Audio('plop1.mp3'),
    new Audio('plop2.mp3'),
    new Audio('plop3.mp3')
  ];

  plopSounds.forEach(sound => {
    sound.preload = 'auto';
  });

  function playPlop(){
    try {
      const sound = plopSounds[Math.floor(Math.random() * plopSounds.length)];
      sound.currentTime = 0;
      sound.play();
    } catch(err) {}
  }



  let rootNode;
  let categoryNodes = [];
  let subcategoryNodes = [];
  let gameNodes = [];
  let activeCategory = null;
  let activeSubcategory = null;
  let focusPoint = null;

  function stageCenter(){ return { x: window.innerWidth / 2, y: window.innerHeight / 2 + 8 }; }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
  function polar(cx, cy, radius, angleDeg){ const a = angleDeg * Math.PI / 180; return { x: cx + Math.cos(a) * radius, y: cy + Math.sin(a) * radius }; }
  function categoryRadius(){ return clamp(Math.min(window.innerWidth, window.innerHeight) * 0.28, 145, 255); }
function subcategoryRadius(){ return clamp(Math.min(window.innerWidth, window.innerHeight) * 0.23, 135, 240); }
  function gameRadius(){ return clamp(Math.min(window.innerWidth, window.innerHeight) * 0.25, 150, 245); }

  function spreadAngles(count, start = -90, spread = 360){
    if(count <= 1) return [start];
    if(spread >= 360) return Array.from({ length: count }, (_, i) => start + i * (360 / count));
    return Array.from({ length: count }, (_, i) => start - spread / 2 + i * (spread / (count - 1)));
  }

  function animateCameraToward(point){
  if(!camera || !point) return;

  const dx = Math.round(window.innerWidth / 2 - point.x);
  const dy = Math.round(window.innerHeight / 2 - point.y);

  camera.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;
}

function animateBackgroundToward(point){
  if(!point) return;

  const dx = point.x - window.innerWidth / 2;
  const dy = point.y - window.innerHeight / 2;

  const farX = Math.round(clamp(-dx * 0.245, -252, 252));
  const farY = Math.round(clamp(-dy * 0.245, -244, 244));

  const midX = Math.round(clamp(-dx * 0.300, -320, 320));
  const midY = Math.round(clamp(-dy * 0.300, -296, 296));

  const nearX = Math.round(clamp(-dx * 0.380, -410, 410));
  const nearY = Math.round(clamp(-dy * 0.380, -370, 270));

  if(bokehLayers.far) bokehLayers.far.style.transform = `translate3d(${farX}px, ${farY}px, 0)`;
  if(bokehLayers.mid) bokehLayers.mid.style.transform = `translate3d(${midX}px, ${midY}px, 0)`;
  if(bokehLayers.near) bokehLayers.near.style.transform = `translate3d(${nearX}px, ${nearY}px, 0)`;
}

function setFocusPoint(point){
  focusPoint = point ? { x: point.x, y: point.y } : stageCenter();
  animateCameraToward(focusPoint);
  animateBackgroundToward(focusPoint);
  setDescriptionSideFromPoint(focusPoint);
}

  function removeNodes(nodes){ nodes.forEach(n => { n.classList.remove('show'); setTimeout(() => n.remove(), 260); }); }

  function setDescription(text, title = ''){
	  if(!text){
		descriptionBar.classList.remove('is-visible');
		descriptionBar.innerHTML = '';
		return;
	  }

	  descriptionBar.innerHTML = title
  ? `<div class="descriptionTitle">${title}</div><div class="descriptionText">${text}</div>`
  : `<div class="descriptionText">${text}</div>`;
	  descriptionBar.classList.add('is-visible');
	}

  function clearLines(){
  lines.innerHTML = '';
  clearLineBadges();
}
function lineBetween(a, b, isNew = false){
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', a.x);
  line.setAttribute('y1', a.y);
  line.setAttribute('x2', b.x);
  line.setAttribute('y2', b.y);

  if(isNew){
    addLineBadge(a, b, 'Ny');
  }

  lines.appendChild(line);
  return line;
}



  function hasNewInGame(game){ return !!game.new; }
  function hasNewInSubcategory(subcategory){ return subcategory.games.some(hasNewInGame); }
  function hasNewInCategory(category){ return category.subcategories.some(hasNewInSubcategory); }
  function anyNewAnywhere(){ return data.categories.some(hasNewInCategory); }

function addNewBadge(el){
  // keep empty, or remove the function entirely if you want
}

  function attachDescriptionHandlers(el, item){
  if(!item || !item.description) return;

  const onEnter = () => {
    setDescriptionSideFromPoint(el._pos || focusPoint);
    setDescription(item.description, item.title);
  };

  const onLeave = () => {
    setDescription('');
  };

  el.addEventListener('mouseenter', onEnter);
  el.addEventListener('mouseleave', onLeave);
  el.addEventListener('focus', onEnter);
  el.addEventListener('blur', onLeave);
  
}
  
  function clearLineBadges(){
  if(lineBadges) lineBadges.innerHTML = '';
}

function setDescriptionSideFromPoint(point){
  if(!point) {
    descriptionBar.classList.remove('is-left', 'is-right');
    descriptionBar.classList.add('is-left');
    return;
  }

  const cx = window.innerWidth / 2;
  const dx = point.x - cx;

  descriptionBar.classList.remove('is-left', 'is-right');

  if(dx > 40){
    // focus is to the right, so put description on the right
    descriptionBar.classList.add('is-right');
  } else if(dx < -40){
    // focus is to the left, so put description on the left
    descriptionBar.classList.add('is-left');
  } else {
    // roughly centered / straight down -> default to left
    descriptionBar.classList.add('is-left');
  }
}

function addLineBadge(a, b, text = 'New'){
  if(!lineBadges) return;

  const midX = (a.x + b.x) / 2;
  const midY = (a.y + b.y) / 2;

  const badge = document.createElement('span');
  badge.className = 'line-badge-new';
  badge.textContent = text;
  badge.style.left = `${midX}px`;
  badge.style.top = `${midY}px`;

  lineBadges.appendChild(badge);
}

function resetNodeLineLinks(){
  if(rootNode) rootNode._linkedLines = [];
  categoryNodes.forEach(n => n._linkedLines = []);
  subcategoryNodes.forEach(n => n._linkedLines = []);
  gameNodes.forEach(n => n._linkedLines = []);
}

function linkLine(node, line){
  if(!node || !line) return;
  if(!node._linkedLines) node._linkedLines = [];
  node._linkedLines.push(line);
}

function setNodeLineHighlight(node, on){
  if(!node) return;

  node.classList.toggle('is-highlighted', on);

  if(node._linkedLines){
    node._linkedLines.forEach(line => {
      line.classList.toggle('is-highlighted', on);
    });
  }

  if(node._linkedNodes){
    node._linkedNodes.forEach(linkedNode => {
      linkedNode.classList.toggle('is-highlighted', on);
    });
  }
}


function resetNodeLinks(){
  if(rootNode) {
    rootNode._linkedLines = [];
    rootNode._linkedNodes = [];
  }
  categoryNodes.forEach(n => {
    n._linkedLines = [];
    n._linkedNodes = [];
  });
  subcategoryNodes.forEach(n => {
    n._linkedLines = [];
    n._linkedNodes = [];
  });
  gameNodes.forEach(n => {
    n._linkedLines = [];
    n._linkedNodes = [];
  });
}

function linkNodes(a, b){
  if(!a || !b) return;
  if(!a._linkedNodes) a._linkedNodes = [];
  if(!b._linkedNodes) b._linkedNodes = [];
  a._linkedNodes.push(b);
  b._linkedNodes.push(a);
}

function attachLineHoverHandlers(node){
  const onEnter = () => setNodeLineHighlight(node, true);
  const onLeave = () => setNodeLineHighlight(node, false);

  node.addEventListener('mouseenter', onEnter);
  node.addEventListener('mouseleave', onLeave);
  node.addEventListener('focus', onEnter);
  node.addEventListener('blur', onLeave);
}

  function createNode({ kind, title, subtitle, color, x, y, onClick, href, isNew = false, descriptionItem = null }){
    const el = document.createElement(href ? 'a' : 'button');
    el.className = `node ${kind}`;
    if(color) el.dataset.color = color;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    if(href){
      el.href = href; el.target = '_blank'; el.rel = 'noopener noreferrer'; el.setAttribute('aria-label', title);
    } else {
      el.type = 'button';
    }
    el.innerHTML = `<div class="inner"><div class="title">${title}</div>${subtitle ? `<div class="subtitle">${subtitle}</div>` : ''}</div>`;
    if(isNew) addNewBadge(el);
	el.addEventListener('click', playPlop);
    if(onClick) el.addEventListener('click', onClick);
    attachDescriptionHandlers(el, descriptionItem);
    camera.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
	attachLineHoverHandlers(el);
    return el;
  }



  function getCategoryAnchor(category){
    const c = stageCenter();
    const angles = spreadAngles(data.categories.length, -90, window.innerWidth < 760 ? 260 : 360);
    const index = data.categories.findIndex(cat => cat.id === category.id);
    return polar(c.x, c.y, categoryRadius(), angles[index]);
  }

  function renderRoot(){
    const c = stageCenter();
    if(rootNode) rootNode.remove();
    rootNode = createNode({
      kind: 'root', title: data.title, subtitle: '', x: c.x, y: c.y, isNew: anyNewAnywhere(),
		onClick: () => {
  const atRoot = !activeCategory && !activeSubcategory;

  if(!categoryNodes.length && atRoot){
    renderCategories();
    updateRootSubtitle();
    redrawLines();
    return;
  }

  if(categoryNodes.length && atRoot){
    removeNodes(categoryNodes);
    removeNodes(subcategoryNodes);
    removeNodes(gameNodes);
    categoryNodes = [];
    subcategoryNodes = [];
    gameNodes = [];
    clearLines();
    setDescription('');
    updateRootSubtitle();
    redrawLines();
    return;
  }

  activeCategory = null;
  activeSubcategory = null;
  removeNodes(subcategoryNodes);
  removeNodes(gameNodes);
  subcategoryNodes = [];
  gameNodes = [];
  setFocusPoint(stageCenter());
  rerender();
  updateRootSubtitle();
  redrawLines();
}
    });
  
  }

  function toggleCategories(){
    if(categoryNodes.length){
      removeNodes(categoryNodes); removeNodes(subcategoryNodes); removeNodes(gameNodes);
      categoryNodes = []; subcategoryNodes = []; gameNodes = [];
      activeCategory = null; activeSubcategory = null;
      clearLines(); setDescription(''); 
      return;
    }
    renderCategories();
  }

  function renderCategories(){
    removeNodes(categoryNodes); categoryNodes = [];
    const visible = activeCategory ? data.categories.filter(cat => cat.id === activeCategory) : data.categories;
    visible.forEach((category) => {
      const p = getCategoryAnchor(category);
      const node = createNode({
        kind: 'category', title: category.title, subtitle: category.subtitle, color: category.color, x: p.x, y: p.y,
        isNew: hasNewInCategory(category),
        onClick: (ev) => {
		  ev.stopPropagation();
		  activeCategory = category.id;
		  activeSubcategory = null;
		  setFocusPoint(p);
		  rerender();
		}
      });
      node._pos = p; node._category = category; categoryNodes.push(node);
    });
    redrawLines();
  }

  function renderSubcategories(){
    removeNodes(subcategoryNodes); subcategoryNodes = [];
    if(!activeCategory) return;
    const category = data.categories.find(cat => cat.id === activeCategory);
    const categoryNode = categoryNodes.find(n => n._category.id === activeCategory);
    if(!category || !categoryNode) return;

    const categoryPos = categoryNode._pos;
    const angleFromRoot = Math.atan2(categoryPos.y - stageCenter().y, categoryPos.x - stageCenter().x) * 180 / Math.PI;
    const visible = activeSubcategory ? category.subcategories.filter(sub => sub.id === activeSubcategory) : category.subcategories;
   const spread = Math.min(180, 48 * Math.max(1, category.subcategories.length - 1));
    const allAngles = spreadAngles(category.subcategories.length, angleFromRoot, spread);

    visible.forEach((subcategory) => {
      const index = category.subcategories.findIndex(sub => sub.id === subcategory.id);
      const p = polar(categoryPos.x, categoryPos.y, subcategoryRadius(), allAngles[index]);
      const node = createNode({
        kind: 'subcategory', title: subcategory.title, subtitle: subcategory.subtitle, color: subcategory.color || category.color || '', x: p.x, y: p.y,
        isNew: hasNewInSubcategory(subcategory),
		onClick: (ev) => {
		  ev.stopPropagation();
		  activeSubcategory = subcategory.id;
		  setFocusPoint(p);
		  rerender();
		}
      });
      node._pos = p; node._subcategory = subcategory; subcategoryNodes.push(node);
    });
    redrawLines();
  }

  function renderGames(){
    removeNodes(gameNodes); gameNodes = [];
    if(!activeCategory || !activeSubcategory) return;
    const category = data.categories.find(cat => cat.id === activeCategory);
    const subcategory = category?.subcategories.find(sub => sub.id === activeSubcategory);
    const subNode = subcategoryNodes.find(n => n._subcategory.id === activeSubcategory);
    if(!category || !subcategory || !subNode) return;

    const subPos = subNode._pos;
    const baseAngle = Math.atan2(subPos.y - stageCenter().y, subPos.x - stageCenter().x) * 180 / Math.PI;
    const spread = Math.min(220, 40 * Math.max(1, subcategory.games.length - 1));
    const allAngles = spreadAngles(subcategory.games.length, baseAngle, spread);

    subcategory.games.forEach((game, index) => {
      const p = polar(subPos.x, subPos.y, gameRadius(), allAngles[index]);
      const node = createNode({
        kind: 'game', title: game.title, subtitle: '', color: game.color || subcategory.color || category.color || '', x: p.x, y: p.y,
        href: game.url, isNew: !!game.new, descriptionItem: game
      });
      node._pos = p; node._game = game; gameNodes.push(node);
    });
    redrawLines();
  }

function redrawLines(){
  clearLines();
  resetNodeLinks();

  const rootPos = stageCenter();

  categoryNodes.forEach(node => {
    const line = lineBetween(rootPos, node._pos, hasNewInCategory(node._category));

    linkLine(rootNode, line);
    linkLine(node, line);
    linkNodes(rootNode, node);
  });

  if(activeCategory){
    const categoryNode = categoryNodes.find(n => n._category.id === activeCategory);

    subcategoryNodes.forEach(node => {
      const line = lineBetween(categoryNode._pos, node._pos, hasNewInSubcategory(node._subcategory));

      linkLine(categoryNode, line);
      linkLine(node, line);
      linkNodes(categoryNode, node);
    });

    if(activeSubcategory){
      const subNode = subcategoryNodes.find(n => n._subcategory.id === activeSubcategory);

      gameNodes.forEach(node => {
        const line = lineBetween(subNode._pos, node._pos, !!node._game.new);

        linkLine(subNode, line);
        linkLine(node, line);
        linkNodes(subNode, node);
      });
    }
  }
}

  function rerender(){
    const hadCategories = categoryNodes.length > 0 || activeCategory;
    clearLines();
    removeNodes(categoryNodes); removeNodes(subcategoryNodes); removeNodes(gameNodes);
    categoryNodes = []; subcategoryNodes = []; gameNodes = [];
    renderRoot();
    if(hadCategories){
      renderCategories();
      if(activeCategory) renderSubcategories();
      if(activeCategory && activeSubcategory) renderGames();
    }
    if(focusPoint){ animateCameraToward(focusPoint); animateBackgroundToward(focusPoint); }
  }

  stage.addEventListener('click', (e) => {
    if(e.target === stage || e.target === camera || e.target === lines) setDescription('');
  });

  setFocusPoint(stageCenter());
  renderRoot();
  // setTimeout(renderCategories, 240);
  window.addEventListener('resize', () => { if(!focusPoint) setFocusPoint(stageCenter()); rerender(); });
  </script>
